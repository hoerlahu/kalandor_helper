<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalandor Character Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="checkbox" id="debugModeToggle" style="position:fixed;top:12px;left:12px;z-index:1000;transform:scale(1.3);" />
    <label for="debugModeToggle" style="position:fixed;top:10px;left:38px;z-index:1000;font-size:1em;background:#fff8;border-radius:4px;padding:2px 8px;">Debug</label>
    <div class="container">
        <h1>⚔️ Kalandor Character Manager</h1>
        <p class="subtitle">Your companion for pen and paper adventures</p>
        
        <div class="features">
            <div class="feature" id="whatToRollFeature" style="cursor:pointer;">
                <h3>📊 What do I roll?</h3>
                <p>Find out what influences your roll</p>
            </div>
            <div class="feature" id="inventoryFeature" style="cursor:pointer;">
                <h3>🎒 Inventory</h3>
                <p>Keep track of items, equipment, and resources</p>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="alert('Tutorial coming soon!')">Learn More</button>
            <button id="importBtn" class="btn-secondary">Import JSON</button>
            <button id="exportBtn" class="btn-secondary">Export JSON</button>
            <input id="fileInput" type="file" accept="application/JSON,.json" style="display:none" />
        </div>

        <div id="importResult" style="margin-top:20px; text-align:left;"></div>
        <div id="rollSelector" style="margin-top:20px; text-align:left; display:none;"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
